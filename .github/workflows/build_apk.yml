name: Nexus Flutter Production Compiler Engine

on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v3

      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🎯 Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.6' # Forced stable version to prevent compile errors

      - name: 🏗️ Create Super Stable Project
        run: |
          rm -rf nexus_app
          flutter create nexus_app --project-name=nexus_mod_app --org=com.nexus.node
          cd nexus_app
          
          # Injecting the code sent from Sketchware App safely
          cat << 'INNER_EOF' > lib/main.dart
          ${{ github.event.client_payload.code }}
          INNER_EOF

      - name: 📦 Build Production APK
        run: |
          cd nexus_app
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: 🧹 Clean Old Release Tags
        run: |
          gh release delete latest --yes || true
          git push --delete origin latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚡ Upload Direct App Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          files: nexus_app/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
