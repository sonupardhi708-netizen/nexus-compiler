name: Nexus Cloud Compiler Engine
on:
  repository_dispatch:
    types: [nexus_build_command]
  workflow_dispatch:
    inputs:
      command:
        description: 'App UI Requirement'
        required: false
        default: 'Simple dashboard app'
      app_name:
        description: 'App Name'
        required: false
        default: 'NexusApp'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: pip install requests
      - name: Build and Compile
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          APP_PROMPT: ${{ github.event.inputs.command }}
          APP_NAME: ${{ github.event.inputs.app_name }}
        run: |
          python3 -c "
          import os, requests, re
          prompt = os.getenv('APP_PROMPT') or 'Create a simple dashboard'
          api_key = os.getenv('GROQ_API_KEY')
          headers = {'Authorization': f'Bearer {api_key}', 'Content-Type': 'application/json'}
          data = {'model': 'llama3-70b-8192', 'messages': [{'role': 'user', 'content': f'Generate Flutter main.dart code for: {prompt}'}], 'temperature': 0.2}
          res = requests.post('https://api.groq.com/openai/v1/chat/completions', headers=headers, json=data).json()
          code = re.search(r'```dart(.*?)```', res['choices'][0]['message']['content'], re.DOTALL).group(1)
          os.makedirs('lib', exist_ok=True)
          with open('lib/main.dart', 'w') as f: f.write(code)
          "
          flutter create .
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: build/app/outputs/flutter-apk/app-release.apk
