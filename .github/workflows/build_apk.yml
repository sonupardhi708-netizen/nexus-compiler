name: Nexus Flutter Production Compiler Engine

on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📂 Checkout Repository
      uses: actions/checkout@v3

    - name: ⚙️ Setup Java JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: 🚀 Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        architecture: x64

    - name: 🛠️ Create Flutter Project Structure
      run: |
        rm -rf nexus_app
        flutter create nexus_app --project-name=nexus_app --org=com.nexus.ai
        
        cat << 'INNER_EOF' > nexus_app/lib/main.dart
        ${{ github.event.client_payload.code }}
        INNER_EOF

    - name: 📦 Install Dependencies & Compile APK
      run: |
        cd nexus_app
        flutter pub get
        flutter build apk --release --no-tree-shake-icons

    - name: 📤 Upload Production APK
      uses: actions/upload-artifact@v3
      with:
        name: Nexus-Production-APK
        path: nexus_app/build/app/outputs/flutter-apk/app-release.apk
        
