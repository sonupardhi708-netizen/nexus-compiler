name: Nexus Cloud Compiler Engine

on:
  repository_dispatch:
    types: [nexus_build_command]
  workflow_dispatch:
    inputs:
      command:
        description: 'App UI Requirement'
        required: false
        default: 'Simple dashboard app'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          APP_PROMPT: ${{ github.event.inputs.command || github.event.client_payload.command || 'Simple dashboard app' }}
        run: |
          pip install requests
          flutter create project_source --org com.nexus.lifecontrol
          python3 build_script.py
          cd project_source
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          mkdir -p ../build/outputs/apk/release
          cp build/app/outputs/flutter-apk/app-release.apk ../build/outputs/apk/release/app-release.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: build/outputs/apk/release/app-release.apk
