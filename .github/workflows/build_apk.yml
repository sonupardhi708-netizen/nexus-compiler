name: Nexus Cloud Compiler Engine
on:
  repository_dispatch:
    types: [nexus_build_command]
  workflow_dispatch:
    inputs:
      command:
        description: 'App UI Requirement'
        required: false
        default: 'Simple dashboard app'
      app_name:
        description: 'App Name'
        required: false
        default: 'NexusLifeControl'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: pip install requests

      - name: Build and Compile
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          APP_PROMPT: ${{ github.event.inputs.command || github.event.client_payload.command || 'Simple dashboard app' }}
        run: |
          flutter create project_source --org com.nexus.lifecontrol
          
          cat << 'EOF' > generate_code.py
          import os
          import requests
          import json
          import re

          api_key = os.getenv('GROQ_API_KEY')
          prompt = os.getenv('APP_PROMPT')

          sys_ins = "Act as an expert Flutter Developer. Output ONLY valid, clean Dart code inside a single ```dart 
``` block. No explanations."
          headers = {
              "Authorization": f"Bearer {api_key}",
              "Content-Type": "application/json"
          }
          data = {
              "model": "llama3-70b-8192",
              "messages": [
                  {"role": "system", "content": sys_ins},
                  {"role": "user", "content": prompt}
              ],
              "temperature": 0.2
          }

          try:
              res = requests.post("https://api.groq.com/openai/v1/chat/completions", headers=headers, json=data).json()
              ai_text = res['choices'][0]['message']['content']
              code_match = re.search(r'```dart(.*?)```', ai_text, re.DOTALL)
              clean_code = code_match.group(1).strip() if code_match else ai_text.strip()
              
              with open("project_source/lib/main.dart", "w") as f:
                  f.write(clean_code)
              print("Code generated successfully!")
          except Exception as e:
              print(f"Error: {e}")
          EOF

          python3 generate_code.py

          cd project_source
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          cd ..
          mkdir -p build/outputs/apk/release
          cp project_source/build/app/outputs/flutter-apk/app-release.apk build/outputs/apk/release/app-release.apk

      - name: Upload Artifact File
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: build/outputs/apk/release/app-release.apk
