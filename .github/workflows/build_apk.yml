name: Nexus Cloud Compiler Engine (AI Alive Edition)

on:
  repository_dispatch:
    types: [nexus_build_command]

# गिटहब को रिलीज बनाने और एपीके अपलोड करने की पूरी परमिशन देना
permissions:
  contents: write

jobs:
  build-and-compile:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Blueprint
      uses: actions/checkout@v4

    - name: Set up Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter Setup Engine (The Real Compiler)
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Set up Python for AI Processing
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Request Library
      run: pip install requests

    - name: Create Base Flutter Project & Inject Dependencies
      run: |
        rm -rf nexus_app
        flutter create nexus_app --project-name=nexus_mod_app --org=com.nexus.node
        cd nexus_app
        # एआई कोड में एडमॉब एरर न आए, इसलिए प्लगइन पहले ही जोड़ रहे हैं
        flutter pub add google_mobile_ads

    - name: Call Groq AI & Auto-Configure Android Manifest
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        python -c "
        import os, requests, json, re

        prompt = \"\"\"${{ github.event.client_payload.command }}\"\"\"
        app_name = \"\"\"${{ github.event.client_payload.app_name }}\"\"\"
        package_name = \"\"\"${{ github.event.client_payload.package_name }}\"\"\"

        print(f'>> Processing Request for App: {app_name}')

        # 1. AndroidManifest.xml में AdMob की ऑफिशियल टेस्ट आईडी डालना (ताकि ऐप क्रैश न हो)
        manifest_path = 'nexus_app/android/app/src/main/AndroidManifest.xml'
        if os.path.exists(manifest_path):
            with open(manifest_path, 'r') as f:
                content = f.read()
            admob_meta = '\n        <meta-data\n            android:name=\"com.google.android.gms.ads.APPLICATION_ID\"\n            android:value=\"ca-app-pub-3940256099942544~3347511713\"/>\n'
            if '</application>' in content and 'com.google.android.gms.ads.APPLICATION_ID' not in content:
                content = content.replace('</application>', admob_meta + '</application>')
                with open(manifest_path, 'w') as f:
                    f.write(content)
                print('✅ AdMob Application ID injected successfully!')

        # 2. Groq AI से कोड मांगना
        system_instruction = 'You are the Nexus AI Pro Builder core engine. Generate a complete, robust single-file lib/main.dart production code using Flutter based on the user request. Ensure premium dark-cyber theme, interactive layouts, and integrate full Google Mobile Ads (AdMob) structures using official test IDs. Remember to import package:google_mobile_ads/google_mobile_ads.dart and call MobileAds.instance.initialize() inside main(). Output ONLY the executable code inside a single ```dart ... ``` codeblock. Do not write explanations.'

        headers = {
            'Authorization': f'Bearer {os.environ[\"GROQ_API_KEY\"]}',
            'Content-Type': 'application/json'
        }

        data = {
            'model': 'llama3-70b-8192',
            'messages': [
                {'role': 'system', 'content': system_instruction},
                {'role': 'user', 'content': f'App Name: {app_name}, Package: {package_name}. Build Command: {prompt}'}
            ],
            'temperature': 0.2
        }

        response = requests.post('https://api.groq.com/openai/v1/chat/completions', headers=headers, json=data)
        res_json = response.json()
        
        if 'choices' not in res_json:
            print('❌ AI Generation Failed! Check API Key.')
            print(res_json)
            exit(1)

        ai_text = res_json['choices'][0]['message']['content']

        code_match = re.search(r'```dart(.*?)```', ai_text, re.DOTALL)
        clean_code = code_match.group(1).strip() if code_match else ai_text.strip()

        os.makedirs('nexus_app/lib', exist_ok=True)
        with open('nexus_app/lib/main.dart', 'w') as f:
            f.write(clean_code)
            
        print('✅ SUCCESS: New AI code injected into nexus_app/lib/main.dart!')
        "

    - name: 📦 Build Production APK (असली कंपाइलेशन)
      run: |
        cd nexus_app
        flutter pub get
        flutter build apk --release --no-tree-shake-icons

    - name: Deploy Generated APK to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "latest"
        name: "Nexus Automated Smart Build"
        body: |
          🤖 Generated via Nexus AI Brain.
          📦 Package Name: ${{ github.event.client_payload.package_name }}
        files: nexus_app/build/outputs/flutter-apk/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
