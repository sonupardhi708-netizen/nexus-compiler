name: Nexus Flutter Production Compiler Engine

on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🎯 Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🏗️ Create Super Stable Project
        run: |
          rm -rf nexus_app
          flutter create nexus_app --project-name=nexus_mod_app --org=com.nexus.node
          cd nexus_app
          
          # Base64 से कोड को बिना किसी स्ट्रिंग टूटे वापस असली Flutter कोड में बदलना
          echo "${{ github.event.client_payload.code }}" | base64 --decode > lib/main.dart

      - name: 📦 Build Production APK
        run: |
          cd nexus_app
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: 🧹 Clean Old Release Tags
        run: |
          gh release delete latest --yes || true
          git push --delete origin latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚡ Upload Direct App Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: nexus_app/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
