name: Nexus Cloud Compiler Engine

on:
  repository_dispatch:
    types: [nexus_build]
  workflow_dispatch:
    inputs:
      command:
        description: 'App UI Requirement'
        required: false
        default: 'Simple dashboard app'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          APP_PROMPT: ${{ github.event.inputs.command || github.event.client_payload.APP_PROMPT }}
          APP_NAME: ${{ github.event.client_payload.app_name || 'Nexus App' }}
          PKG_NAME: ${{ github.event.client_payload.pkg_name || 'com.nexus.live' }}
        run: |
          pip install requests
          
          # 1. Create a fresh Flutter project
          flutter create project_source --org com.nexus.livecontrol
          
          # 2. Run python script to fetch fresh code from AI
          python3 build_script.py
          
          # 3. Smart Check: Proceed only if file exists, else fail early
          if [ -f lib/main.dart ]; then
            echo "🟢 Fresh Dart code detected! Replacing counter app..."
            cp lib/main.dart project_source/lib/main.dart
          else
            echo "❌ CRITICAL ERROR: build_script.py failed to generate main.dart!"
            exit 1
          fi
          
          # 4. Navigate into project source and build binaries
          cd project_source
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
          # 5. Move final production APK to output directory
          mkdir -p ../build/outputs/apk/release
          cp build/app/outputs/flutter-apk/app-release.apk ../build/outputs/apk/release/app-release.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: build/outputs/apk/release/app-release.apk

      - name: 🔥 Auto Release APK (Zinda Mode)
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: latest
          name: "Nexus AI PRO Generated Build"
          draft: false
          prerelease: false
          files: build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
