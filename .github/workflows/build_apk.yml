name: Nexus Cloud Compiler Engine
on:
  repository_dispatch:
    types: [nexus_build_command]
  workflow_dispatch:
    inputs:
      command:
        description: 'App UI Requirement'
        required: false
        default: 'Simple dashboard app'
      app_name:
        description: 'App Name'
        required: false
        default: 'NexusLifeControl'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fetch Clean AI Code
        id: groq_api
        run: |
          PROMPT="${{ github.event.inputs.command || github.event.client_payload.command || 'Simple dashboard app' }}"
          
          RESPONSE=$(curl -X POST "https://api.groq.com/openai/v1/chat/completions" \
            -H "Authorization: Bearer ${{ secrets.GROQ_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "llama3-70b-8192",
              "messages": [
                {"role": "system", "content": "Return ONLY executable Dart code for main.dart. No explanations, no markdown blocks."},
                {"role": "user", "content": "'"$PROMPT" '"}
              ],
              "temperature": 0.2
            }')
          
          # एक्सट्रैक्ट कोड
          CLEAN_CODE=$(echo "$RESPONSE" | jq -r '.choices[0].message.content' | sed 's/```dart//g' | sed 's/
```//g')
          
          # प्रोजेक्ट सेटअप और कोड राइटिंग
          flutter create project_source --org com.nexus.lifecontrol
          echo "$CLEAN_CODE" > project_source/lib/main.dart

      - name: Compile Real Android APK
        run: |
          cd project_source
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          cd ..
          mkdir -p build/outputs/apk/release
          cp project_source/build/app/outputs/flutter-apk/app-release.apk build/outputs/apk/release/app-release.apk

      - name: Upload Artifact File
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: build/outputs/apk/release/app-release.apk
